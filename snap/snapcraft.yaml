name: mora-tictactoe
base: core22
version: '1.0.0'
summary: Un jeu de morpion minimaliste au design néon.
description: |
  Découvrez une expérience de jeu épurée avec Moea TicTacToe. 
  Design moderne, interface fluide et esthétique néon.

grade: stable
confinement: devmode

# FORCE l'architecture standard PC
architectures:
  - build-on: amd64

parts:
  tictactoe-game:
    plugin: nil
    source: .
    build-snaps:
      - node/22/stable # On passe à Node 22 pour satisfaire Electron Builder
    override-build: |
      export ELECTRON_SKIP_BINARY_DOWNLOAD=1
      
      # On s'assure que npm est à jour pour éviter les bugs de proxy
      npm install -g npm@latest
      
      # Installation propre
      npm install --ignore-scripts
      
      # On lance la création du Snap
      npx electron-builder --linux snap
      
      # On déplace le résultat
      mkdir -p $SNAPCRAFT_PART_INSTALL/
      cp dist/*.snap $SNAPCRAFT_PART_INSTALL/
      
apps:
  mora-tictactoe:
    command: mora-tictactoe
    extensions: [gnome]
    plugs:
      - x11
      - opengl
      - desktop
      - desktop-legacy
      - wayland