name: mora-tictactoe
base: core22
version: '1.0.0'
summary: Un jeu de morpion minimaliste au design néon.
description: |
  Découvrez une expérience de jeu épurée avec Moea TicTacToe. 
  Design moderne, interface fluide et esthétique néon.

grade: stable
confinement: devmode

# FORCE l'architecture standard PC
architectures:
  - build-on: amd64

parts:
  tictactoe-game:
    plugin: nil
    source: .
    build-snaps:
      - node/20/stable
    override-build: |
      # On dit à Electron de ne pas essayer de télécharger ses binaires maintenant
      export ELECTRON_SKIP_BINARY_DOWNLOAD=1
      
      # Installation des dépendances en ignorant les scripts qui bloquent
      npm install --ignore-scripts
      
      # Maintenant on lance le build proprement
      npx electron-builder --linux snap
      
      # On déplace le résultat vers le dossier d'installation du snap
      mkdir -p $SNAPCRAFT_PART_INSTALL/
      cp dist/*.snap $SNAPCRAFT_PART_INSTALL/

apps:
  mora-tictactoe:
    command: mora-tictactoe
    extensions: [gnome]
    plugs:
      - x11
      - opengl
      - desktop
      - desktop-legacy
      - wayland