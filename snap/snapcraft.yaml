name: mora-tictactoe
base: core22
version: '1.0.0'
summary: Un jeu de morpion minimaliste au design néon.
description: |
  Mora TicTacToe – un jeu simple, rapide, au style néon futuriste.

grade: stable
confinement: strict

parts:
  app:
    plugin: nil
    source: .
    build-snaps:
      - node/22/stable
    override-build: |
      # Installer les dépendances sans scripts Electron
      export ELECTRON_SKIP_BINARY_DOWNLOAD=1
      npm install --ignore-scripts

      # Build Electron en mode "dir"
      npx electron-builder --linux dir --config electron-builder.json

      # Installer dans le Snap
      mkdir -p $SNAPCRAFT_PART_INSTALL/opt/app
      cp -r dist/linux-unpacked/* $SNAPCRAFT_PART_INSTALL/opt/app/

      # Créer un lanceur
      mkdir -p $SNAPCRAFT_PART_INSTALL/bin
      ln -s $SNAPCRAFT_PART_INSTALL/opt/app/Mora\ TicTacToe $SNAPCRAFT_PART_INSTALL/bin/mora-tictactoe

apps:
  mora-tictactoe:
    command: bin/mora-tictactoe --no-sandbox
    extensions: [gnome]
    plugs:
      - x11
      - wayland
      - desktop
      - desktop-legacy
      - opengl
      - audio-playback